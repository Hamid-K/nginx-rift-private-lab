daemon off;
user nobody nogroup;
worker_processes 1;
error_log logs/error.log notice;
pid tmp/nginx.pid;
working_directory tmp;

events {
    worker_connections 1024;
}

http {
    access_log off;
    client_body_temp_path tmp;
    proxy_temp_path tmp;
    fastcgi_temp_path tmp;
    uwsgi_temp_path tmp;
    scgi_temp_path tmp;

    upstream backend {
        server 127.0.0.1:19323;
    }

    server {
        listen 19322;
        location / { return 200 "backend ok\n"; }
    }

    server {
        listen 19321 http2;
        request_pool_size 4096;
        connection_pool_size 1456;
        client_header_buffer_size 4096;
        large_client_header_buffers 4 16384;

        # Original vulnerable shape, with no auxiliary file-read routes.
        location ~ ^/api/(.*)$ {
            rewrite ^/api/(.*)$ /internal?migrated=true;
            set $original_endpoint PPPPPPPPPPP$1;
        }

        location /internal {
            internal;
            proxy_pass http://backend;
            proxy_read_timeout 60s;
        }

        # Passive body reflection candidate. If this ever returns bytes past the
        # stored variable length, it becomes a direct leak candidate.
        location ~ ^/reflect_body/(.*)$ {
            rewrite ^/reflect_body/(.*)$ /reflect_body_sink?migrated=true;
            set $original_endpoint PPPPPPPPPPP$1;
            return 200 "$original_endpoint\n";
        }

        # Passive header reflection candidate.
        location ~ ^/reflect_header/(.*)$ {
            rewrite ^/reflect_header/(.*)$ /reflect_header_sink?migrated=true;
            set $original_endpoint PPPPPPPPPPP$1;
            add_header X-Original "$original_endpoint" always;
            return 200 "ok\n";
        }

        # Redirect path. This mostly validates that Location is attacker-data
        # derived and not a pointer disclosure by itself.
        location ~ ^/reflect_redirect/(.*)$ {
            rewrite ^/reflect_redirect/(.*)$ http://127.0.0.1:19321/landing?$1 redirect;
        }

        location /spray {
            client_body_in_single_buffer on;
            proxy_pass http://backend;
            proxy_read_timeout 60s;
        }

        location /victim_upload {
            client_body_buffer_size 1k;
            proxy_pass http://backend;
            proxy_read_timeout 60s;
        }

        location / { return 200 "ok\n"; }
    }
}
