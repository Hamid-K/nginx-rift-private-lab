daemon off;
user ubuntu;
worker_processes 1;
error_log logs/error.log info;
pid tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    access_log off;
    client_body_temp_path tmp;
    proxy_temp_path tmp;
    fastcgi_temp_path tmp;
    uwsgi_temp_path tmp;
    scgi_temp_path tmp;

    upstream backend {
        server 127.0.0.1:19323;
    }

    server {
        listen 19331;
        server_tokens on;
        request_pool_size 4096;
        connection_pool_size 4096;
        client_header_buffer_size 4096;
        large_client_header_buffers 4 16384;

        location / {
            return 200 "poolslip lab ok\n";
        }

        location /files/ {
            alias /app/www/;
        }

        location /internal {
            internal;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_read_timeout 60s;
        }

        location ~ ^/api/(.*)$ {
            rewrite ^/api/(.*)$ /internal?migrated=true;
            set $original_endpoint $1;
            return 200 "$original_endpoint\n";
        }

        location /spray {
            client_body_in_single_buffer on;
            proxy_pass http://backend;
            proxy_read_timeout 60s;
        }

        location /delay {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_read_timeout 60s;
        }

        location /stream {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_read_timeout 60s;
        }

        location /forced-range {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_force_ranges on;
            proxy_read_timeout 60s;
        }
    }
}
