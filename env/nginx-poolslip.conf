daemon off;
user ubuntu;
worker_processes 1;
error_log logs/error.log info;
pid tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    access_log off;
    client_body_temp_path tmp;
    proxy_temp_path tmp;
    fastcgi_temp_path tmp;
    uwsgi_temp_path tmp;
    scgi_temp_path tmp;

    upstream backend {
        server 127.0.0.1:19323;
    }

    upstream sticky_cookie_backend {
        sticky cookie poolsid domain=$arg_domain samesite=$arg_samesite httponly;
        server 127.0.0.1:19323 route=alpha;
        server 127.0.0.1:19323 route=beta;
    }

    upstream sticky_learn_backend {
        sticky learn zone=poolslip_learn:64k create=$arg_create lookup=$cookie_poollearn header;
        server 127.0.0.1:19323 route=gamma;
        server 127.0.0.1:19323 route=delta;
    }

    server {
        listen 19331;
        server_name _;
        server_tokens on;
        request_pool_size 4096;
        connection_pool_size 4096;
        client_header_buffer_size 4096;
        large_client_header_buffers 4 16384;

        location / {
            return 200 "poolslip lab ok\n";
        }

        location /files/ {
            alias /app/www/;
        }

        location /internal {
            internal;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_read_timeout 60s;
        }

        location ~ ^/api/(.*)$ {
            rewrite ^/api/(.*)$ /internal?migrated=true;
            set $original_endpoint $1;
            return 200 "$original_endpoint\n";
        }

        location /rewrite-old {
            rewrite ^(.*) /new?c=1;
            set $rewrite_capture $1;
            return 200 "$rewrite_capture\n";
        }

        location /spray {
            client_body_in_single_buffer on;
            proxy_pass http://backend;
            proxy_read_timeout 60s;
        }

        location /delay {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "te";
            proxy_set_header TE "trailers";
            proxy_pass_trailers on;
            early_hints $http_early_hints;
            proxy_read_timeout 60s;
        }

        location /scgi-raw {
            scgi_pass 127.0.0.1:19324;
            scgi_param SCGI 1;
            scgi_param REQUEST_METHOD $request_method;
            scgi_param REQUEST_URI $request_uri;
            scgi_param QUERY_STRING $query_string;
            scgi_read_timeout 60s;
        }

        location /uwsgi-raw {
            uwsgi_pass 127.0.0.1:19324;
            uwsgi_param REQUEST_METHOD $request_method;
            uwsgi_param REQUEST_URI $request_uri;
            uwsgi_param QUERY_STRING $query_string;
            uwsgi_read_timeout 60s;
        }

        location /sticky-cookie {
            proxy_pass http://sticky_cookie_backend;
            proxy_read_timeout 60s;
        }

        location /sticky-learn {
            proxy_pass http://sticky_learn_backend;
            proxy_read_timeout 60s;
        }
    }

    server {
        listen 19331;
        server_name tunnel.local;
        server_tokens on;
        request_pool_size 4096;
        connection_pool_size 4096;
        client_header_buffer_size 4096;
        large_client_header_buffers 4 16384;

        tunnel_pass 127.0.0.1:19323;
        tunnel_connect_timeout 2s;
        tunnel_send_timeout 5s;
        tunnel_read_timeout 5s;
    }
}
