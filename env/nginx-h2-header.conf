daemon off;
user ubuntu;
worker_processes 1;
error_log logs/error.log info;
pid tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    access_log off;
    client_body_temp_path tmp;
    proxy_temp_path tmp;

    upstream backend {
        server 127.0.0.1:19323;
    }

    server {
        listen 19361 http2;
        server_name _;
        server_tokens on;

        location / {
            return 200 "h2 header lab ok\n";
        }

        location /h2-header {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_buffer_size 5m;
            proxy_buffers 4 5m;
            proxy_busy_buffers_size 5m;
            proxy_read_timeout 60s;
        }
    }
}
