daemon off;
user ubuntu;
worker_processes 1;
error_log logs/error.log info;
pid tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    access_log off;
    client_body_temp_path tmp;
    proxy_temp_path tmp;

    upstream backend {
        server 127.0.0.1:19323;
    }

    upstream h2_backend {
        server 127.0.0.1:19325;
    }

    upstream h2_capture {
        server 127.0.0.1:19326;
    }

    server {
        listen 19361 http2;
        server_name _;
        server_tokens on;

        location / {
            return 200 "h2 header lab ok\n";
        }

        location /h2-header {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_buffer_size 5m;
            proxy_buffers 4 5m;
            proxy_busy_buffers_size 5m;
            proxy_read_timeout 60s;
        }

        location /h2-upstream {
            proxy_pass http://h2_backend;
            proxy_http_version 2;
            proxy_buffer_size 128k;
            proxy_buffers 4 128k;
            proxy_busy_buffers_size 128k;
            proxy_read_timeout 10s;
        }

        location /h2-set-body {
            client_max_body_size 32m;
            client_body_buffer_size 32m;
            client_body_in_single_buffer on;
            proxy_pass_request_body off;
            proxy_set_body $request_body;
            proxy_pass http://h2_capture;
            proxy_http_version 2;
            proxy_buffer_size 128k;
            proxy_buffers 4 128k;
            proxy_busy_buffers_size 128k;
            proxy_read_timeout 20s;
        }
    }
}
